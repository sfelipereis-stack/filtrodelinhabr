name: Deploy Vite App to GitHub Pages

on:
  push:
    branches: ["main"] # Se a sua branch principal se chamar "master", mude aqui para "master"

  # Permite rodar o fluxo manualmente pela aba Actions
  workflow_dispatch:

# Define as permissões necessárias para o GitHub Actions publicar no Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que apenas um deploy aconteça por vez
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps://github.com/actions/deploy-pages }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # O Vite por padrão joga a pasta compilada para "dist"
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
